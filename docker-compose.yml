services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-credito_digital}
      POSTGRES_USER: ${POSTGRES_USER:-credito_digital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-credito_digital_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credito_digital} -d ${POSTGRES_DB:-credito_digital}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,192.168.15.215}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-credito_digital}
      POSTGRES_USER: ${POSTGRES_USER:-credito_digital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-credito_digital_2026}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://192.168.15.215:8014}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://192.168.15.215:8014}
      CREDIT_PIPELINE_ASYNC: ${CREDIT_PIPELINE_ASYNC:-0}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8014}:80"
    volumes:
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro

volumes:
  postgres_data:
  static_data:
  media_data:
